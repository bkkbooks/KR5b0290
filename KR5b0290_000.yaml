  text: 貫斗忠孝五雷武侯秘法序五七
  hash: sha256:39f74b5e04618c7a3da57b2ff22ba0b11fa12d2d84be9ecc295d5a0f9e9bee50
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0290_HFL_000-001a, image: hfl/0323/0323-066.png}
body:
  text: 旭陽葆光真士吴昇撰天地設位而易行乎其中道在天地而法立乎無外二儀四象隂陽互根八卦九章經緯錯綜神妙萬物氣機殊異雷城指十二之門吉凶有在斗柄列九六之位生殺攸司曰惟至人握造化之樞機知鬼神之情狀斯可去邪勿貳惟精惟一而志於道焉元至元間荆門貢士暉齊張公先生以通經教授其郷館人之家漁江中得圓石瑩淨可愛拾置堂奥先生夜坐視之有光燁煜乃捐館俸買而歸剖之中有方石似鐵二面有文剜剔洗抉刻畫粲若模墨印之至數百幅舉火燎之煙氣鬱勃先生愕然驚胘及𥧌俄見有神英姿颯爽羽𣰉綸巾頎然突前揮鐵如意曰子聞漢有諸葛孔明乎帝命我爲通天煞伐烈雷大神此隂陽神印也子旣得之當助道揚法遇有山魈石祟土木精邪妄入人家殃害生民以神印檄我忠孝雷兵按神禹洛書一坎二坤三震四巽五中六乾七兊八艮九離定位按節候隂陽逆順以焚之超坎終離起離終坎所謂雷風水火摶射而精那絶蹟矣書以授子子其寳之先生窹踴躍起拜敬受其書乃棄俗入武當山從道參究天心正法福國康民聲聞朝野大徳中錫封隱眞玄陽眞人坐南巖飛昇其徒建祠宇嚴祀請于朝賜額昇眞觀後二年雷電閃爍神印飛去火鈴全陽趙眞人以雷劈棗木傳刻蕆法江湖於玉笥立化再傳谷陽黄眞人其法益著天曆出尹山陽至正辛卯蘄頴兵起歸隱洪都西山巳酉上元危坐仙化吾少也獲侍教焉兹不昧其善世不伐之功濟人利物之行且以武侯名成八陣功蓋三分一體君臣昭暎青史知進退存亡不失其正深造乎大易法象之𦣱微也百世之後猶以勇烈正直命于帝庭敷于下土渙汗大號屏斥妖魔濯濯厥靈洋洋在上吁可畏也敢不敬乎貫斗忠孝五雷武侯秘法主法主法九天大杼理格眞玄女元君主將九天助道楊法勇烈正直通天煞伐烈雷大神都統兵大將軍南陽忠武英烈侯諸葛孔明諱亮副將隂雷副將前將軍關羽隂雷副將右將軍張飛隂雷副將左將軍黄忠隂雷副將征西大將軍馬超隂雷副將虎威將軍趙雲將班天篷三十六雷大將七十二隂雷大將六丁六甲元帥十七神王五虎猛將九官八門八陣雷兵五方遞甲鐡甲鐡印官將五方生炁旺炁煞炁死炁金木水火土五雷帥將年龍月將神君七十二候二十四炁神君直年直月直日直時除邪輔正合司將吏八方霹靂忠孝雷兵召役儀式先三淨呪次念天清清地寜寜六丁六甲斬妖精敢有不順吾道者天蓬眞君滅汝形道香一炷十方肅清法皷三通萬神聽令以今焚香關召直日直符使者六丁六甲神吏侍靖素女直壇土地爲吾齎此信香騰誠上奏主法九天大杼理格眞玄女元君火速勑召主將殺伐烈雷大神都統大將軍隂雷副將前將軍關羽隂雷副將右將軍張飛隂雷副將左將軍黃忠隂雷副將征西大將軍馬超隂雷副將虎威將軍趙雲下赴壇前有事指揮變神天皇大帝速變吾神吾爲雷使紈攝雷兵驅役雷吏上合天心急急如天皇伽耶霹靂攝飛化天皇號令白炁混沌灌我形禹步相隨登陽明天廻地轉履七星躡罡飛斗躋九齡惡逆攝伏妖魔傾萬災不干我長生我得長生留福庭旋乾倒坤鬼滅形萬神助我斬妖精急急如天皇大帝律令召合左手煞文右手劔訣存六金星在頭上罩身辰戌斗戌辰斗念召呪玉帝運合天地混沌五炁交結分變無窮洞觀三界八府九宫五雷公子四目老翁速召雷帥霹靂飛空奔雷走電擲火衝風從兵十萬猛馬毒龍黒毒使者捜捉魔兇九宮海沸寳劔耀鋒指揮嶽瀆斬滅邪蹤天丁執法左右神功九醜八壘渺渺呼風崑崙撼動玉笛金鐘魔王束首奔火騰空太一十神誅戮黄奴隂陽交泰罡斗齊恭十方聽令雷電轟轟大震霹靂掃蕩妖兇啹嚧嘘嚦喼𠯀喗𠶥急召主將隂雷副將前將軍關羽隂雷副將右將軍張飛隂雷副將左將軍黄忠隂雷副將征西大將軍馬超隂雷副將虎威將軍趙雲火速到壇有事指揮凝神超太極上下混令光一炁包天地彌羅捧玉皇神定氣昇存西方有一金星大如車輪光徹十方中有雷聲振響光射壇前光出帥現呪曰泰玄之英天齊地并日月交合二氣氤氲森羅萬象列宿光揮神風浩渺黒毒大神雷霆號令勅召雷兵聞吾勑召隨勑現形振驚霹靂掣電飛雲誅那破廟捉鬼擒精號令一下化作微塵唵𠾐昌釋利五稨急急如雷霆伏魔上相真君律令電光三下身在雷大光中存見主帥天人貌威武相五嶽鬚杏子眼挑紅色九葉綸巾左手鐵如意右手白羽扇白衣赤櫬白馬自金光中出五將隨從指使神吏從西而下至壇前隨意遣役三召十七神王呪悉薩和毘遮和隨波門波婆那牛頭陀金頭陀薩達那摩詞婆悉婆利馬頭陀阿遮達波陀利離訶頭摩由羅摩訶摩吉遮羅迦毘那急凖雷火律令疾入祭發印化檄適神告召想巳到壇具有檄文大帥諦聽云事以今告下符印即請大帥流鈴擲火掣電奔雲擐甲飛戈轟雷霹靂雲屯霧擁前去某處如何施行限某日立俟感通以爲効信當職欽承帝命掌握印符領雷霆號令之權判鬼神不典之事令下急如星火法布疾迅風雷三界不許稽停一刻明彰報應疾電光三下見元帥面如噀血兜鍪金甲右手鐡㦸左手鐵如意鐡馬乘黑雲暗霧擁起雷電交作再念十七神王呪噀水霹靂嗚滅攝雙手雷局呪曰亨轟滑辣救竟攝寅午斗雷聲纔響便驚人子午斗國光萬丈照天魔子亥逆行噀水轟雷掣電火罩呪唵吽吽三擅那韓難延乾夷𠡠勑超九天都火部無邊大力神王勑起九天都雷火電火飛火流火擲火霹霹火七星火謝仙火炎雷烈火三天都火王嚴駕䕫龍坐喝飛虎獅子白擇獬豸麒麟火駝火象火鵰萬群銅頭鐡面百萬火兵五帝節鉞四天遊行帝鍾震響魔道皆驚洞天福地嶽瀆幽冥城隍社令不正妖精山傾木陷百谷沸騰何神敢當不伏順行逆吾者死順吾者生北靈黑歷九醜紫童風伯雨師驅雷飲虹巨口風王火郎火女火龍火馬從天降下丙丁擁出火蛇吐氣火雲四起火龍飛奔都天五將噉雷發聲飛砂走石拔樹移根風輪左轉火車右隨照燿天下化作火城八卦斗底雷部四維威罩天下炎炎烈風鬼精見者入地萬丈化作飛灰古木惡廟永劫塵迷急急如九天都火部無邊大力神王大威德大元帥風大雷電律令勅煞攝煞伐天蓬呪唵吽吒唎神吒唎唵吒唎吒唎咭唏吾奉雷霆勅煞攝唵三天大帥四聖之宗天蓬天蓬九玄煞童五丁都司髙刁北翁七政八靈太上皓兇長顱巨獸手把帝鐘天關地軸在吾掌中立南斗内坐北斗中飛雷走電流鈴八衝歘火律令都督雷霆元始勑命玉帝親行素梟三神嚴駕䕫龍威劎神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衞我九重炎神玉女鐵脊魔王辟尸千里去郤不祥敢有小鬼欲來現狀钁天大斧斬鬼五形炎帝烈血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如九天靈魁尊神天蓬都元帥飛迫邪吒飛捉急縳速速紛紛速速攝太乙直使訣按六十甲子起休直使子戊壬甲一丙庚六丑乙巳癸一丁辛六寅戊壬甲六丙庚一卯乙丁辛二癸巳七辰戊壬丙二庚甲七巳己癸丁二辛乙七午戊甲庚三壬丙八未辛乙巳三癸丁八申壬丙庚三甲戊八酉癸丁辛四乙巳九戌甲戊壬四丙庚九亥乙巳癸四丁辛九武侯要旨鐵印隂陽二面太白星也名隂陽關陽日甲巳丁壬戊癸上書意隂日乙丙庚辛下書意意畢五字呪押初直再横三倒未發印先點八門在地吾即武侯却發五將行事剔岀便存身出法界之外行之日乆神遊八極如金日差金上木日差木土土日差土火日差火土水日差水土呪曰金木土水火木土水火金土水火金木水火金木土火金木土水再念回光呪廻光返照光返照廻返照廻光照廻光返急急凖奉玉清雷火律令勑煞攝再用泰玄呪差將塗筆剔出念唵六字呪念六徧仍書押念天蓬呪掐艮户布煞炁用天蓬小順大逆念十七神王呪用神王印貫斗印勑呪吾奉上帝命收攝不正神所有吏兵將疾速附吾身聞呼即便至聞召速降臨敢有違命者嚴令輒不容攝赴魁罡下化爲清淨風急急如玉皇上帝勑初限檄式司額本司今㨿鄉貫入事意合行移檄請照驗如何施行須至檄者印右符檄請主將南陽忠武英烈侯統兵都大元帥部領隂雷副將關張馬黄趙五大雷君五虎猛將九宫八門八陣忠孝合部雷兵火速前去監督城隍里域主者杜令雷神專爲某事定限某日大彰報應謹檄二限檄式司額照㨿鄉貫事意得北除巳遵依元降印檄立限杜絶施行不期頑邪慢視天憲怙終不悛合行催委火速奉行洪惟太初太易有物混成羲皇肇畫四象以生八卦相盪九宫緯經天地定位風霆流形山川鬼神莫有不寜數終末甲𡨚惡憑陵敢有妖魔荼毒生靈蠢兹群醜干試典刑雷斧馘滅時刻無停須至具檄催行者印右檄主將南陽忠武英烈侯統兵都大元帥部領隂雷副將關張馬黃趙五大雷君五虎猛將忠孝雷兵同心恊力金馬驛程疾速往彼篤祐耀靈飛雲走霧噉雷發聲翻天覆地嘯風鞭霆雷火霹靂電火飛騰振撼五嶽捲水四溟雲屯霧擁運動衝衡蛇蟠龍躍虎伯甲庚外道妖魔刻時收斷分離人鬼掃蕩邪精天道以清地道以寜人道貴生鬼道滅形帝鐘震響魔膽䘮傾𨰃天巨斧明檢鬼營不得容隱萬神奉行硃書天蓬呪急急如九天飛迫那吒天蓬都元帥煞鬼横天律令敕煞攝三限檄式司額照㨿郷貫事意杜絶施行蠢兹頑邪草𥩈奸宄覆出爲惡恃終不悛故違天律干試天刑惡積不可掩罪大不可赦天用勦絶殲厥渠魁蕩其黨類施行太初太易大道無名龍漢開圖運度赤明玉清始青玉符告命天皇煥號令岀惟行乾剛行徤震虩離明坤直方大兊擁雄兵山澤通氣坎以信亨巽以行權八卦相錯䇿役雷霆易曰噬嗑先王以明罰𠡠法雷電皆至折獄致刑惟克果斷屠割鬼爽風火無停印右檄主將南陽忠武英烈侯統兵都大元帥部領隂雷副將關張馬黄趙五大雷君五虎猛將忠孝雷兵有赫斯怒爰方啓行震天撼地噉雷轟聲飛戈飄㦸烈風迅電屯雲擁霧龍虎奔騰鷹揚鷙搏摧破鬼營鬼精滅爽妖怪滅形分離人鬼宅舍清寜敢有拒逆律按女青硃書逆天蓬呪急急如九天飛迫那吒天蓬都元帥煞鬼横天律令勑煞攝右貫斗五雷大法乃蜀漢卧龍諸葛武侯之遺秘也勇烈正直簡而易行余少也恪慕玄風得此玄文莫敢怠忽念兹在兹以之治病除邪保己寜家如響斯答神功峻烈炳輝鏗鍧與天地合其德日月合其明知鬼神之情狀莫測其端倪真神之又神玄之又玄者也凡我同志寳而受之敬而行之豈末法之流可同年而語哉貫斗忠孝五雷武侯秘法
